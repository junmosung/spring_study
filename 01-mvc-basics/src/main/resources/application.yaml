spring:
  application:
    name: spring01

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spring01}
    username: ${DB_USERNAME:spring01}
    password: ${DB_PASSWORD:spring01}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.flywaydb: INFO

# --- @ConfigurationProperties 데모 (Tier 1 #1-c) ---
# learning/config/AppProperties.kt, MailProperties.kt 와 1:1 매핑.
# kebab-case 키가 camelCase 필드로 자동 변환되는 relaxed binding 확인용.
app:
  name: spring-study
  owner:
    name: Victor
    email: victor@example.com
  features:
    signup: true
    beta-ui: false
  tags:
    - learning
    - kotlin
  timeouts:
    http: 5s
    db: 2s
  cache-ttl: 10m
  max-upload-size: 20MB

mail:
  host: smtp.example.com
  port: 587
  from: noreply@example.com
